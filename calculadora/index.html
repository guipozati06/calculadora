<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Modular</title>
    <link rel="stylesheet" href="css/polar.css">
</head>
<body>

    <div class="calc">
        <input type="text" id="display" disabled value="0">
        
        <div class="grid">
            <button class="num">7</button><button class="num">8</button><button class="num">9</button>
            <button class="op" data-type="div">/</button>
            
            <button class="num">4</button><button class="num">5</button><button class="num">6</button>
            <button class="op" data-type="mult">*</button>
            
            <button class="num">1</button><button class="num">2</button><button class="num">3</button>
            <button class="op" data-type="sub">-</button>
            
            <button id="clear">C</button>
            <button class="num">0</button>
            <button id="equal">=</button>
            <button class="op" data-type="soma">+</button>
        </div>
    </div>

    <script type="module" src="js/calular.js"></script>
</body>
</html>
